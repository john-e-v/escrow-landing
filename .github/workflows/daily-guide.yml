name: Daily Guide Generator

on:
  schedule:
    # 8:13am MST (UTC-7) = 15:13 UTC. Offset from daily-article.yml (15:03)
    # to avoid both hitting the Anthropic API in the same minute.
    - cron: '13 15 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk
        working-directory: scripts

      - name: Generate guide
        run: node scripts/generate-guide.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_AUTHOR_URN: ${{ secrets.LINKEDIN_AUTHOR_URN }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}

      - name: Commit and push new guide
        run: |
          git config user.name "CLRBLT Guide Bot"
          git config user.email "bot@clrblt.com"
          git add data/guides.json app/guides/
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "guide: $(date -u +%Y-%m-%d) auto-generated" && git push
